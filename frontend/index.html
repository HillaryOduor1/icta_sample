<!doctype html>
<html lang="en">
  <head>
    <!-- Mobile Specific Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Favicon-->
    <link rel="shortcut icon" href="https://icta.go.ke//assets/img/icons/favicon.png">
    <!-- Author Meta -->
    <meta name="author" content="ICTA">
    <!-- Site Title -->
    <title>ICT Authority </title>
    <!-- Meta Description -->
    <meta name="description" content="The Information and Communication Technology (ICT) Authority is a State Corporation under the Ministry of Information Communication and Technology.">
    <!-- Meta Keyword -->
    <meta name="keywords" content="ICT, Communications">
    <!-- meta character set -->
    <meta charset="UTF-8">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://icta.go.ke/" />
    <meta property="og:title" content="ICT Authority – Digital Transformation Kenya" />
    <meta property="og:description" content="The National Digital Masterplan 2022-2032 is transforming Kenya into a regional ICT hub." />
    <meta property="og:image" content="https://icta.go.ke/assets/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://icta.go.ke/" />
    <meta property="twitter:title" content="ICT Authority – Digital Transformation Kenya" />
    <meta property="twitter:description" content="The National Digital Masterplan 2022-2032 is transforming Kenya into a regional ICT hub." />
    <meta property="twitter:image" content="https://icta.go.ke/assets/og-image.jpg" />

    <!-- IOS Tags-->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://icta.go.ke/assets/img/icons/apple-touch-icon.png">
    <link rel="manifest" href="https://icta.go.ke/assets/img/icons/manifest.json">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://icta.go.ke/" />
    <meta name="theme-color" content="#f20d0d" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" crossorigin="anonymous" />
    
    <!-- Critical Theme Script - Runs Immediately -->
    <script>
      (function() {
        try {
          // Get saved theme or default to system
          var savedTheme = localStorage.getItem('theme');
          var theme = savedTheme;
          
          if (theme !== 'light' && theme !== 'dark' && theme !== 'system') {
            theme = 'system';
          }
          
          var appliedTheme;
          if (theme === 'system') {
            appliedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            appliedTheme = theme;
          }
          
          // Apply theme class immediately
          document.documentElement.classList.add(appliedTheme);
          
          // Set background color to prevent flash
          if (appliedTheme === 'dark') {
            document.documentElement.style.backgroundColor = '#0a0a0a';
            document.body.style.backgroundColor = '#0a0a0a';
            document.body.style.color = '#ffffff';
          } else {
            document.documentElement.style.backgroundColor = '#f8f5f5';
            document.body.style.backgroundColor = '#f8f5f5';
            document.body.style.color = '#1a1a1a';
          }
        } catch(e) {
          // Fallback to light mode
          document.documentElement.classList.add('light');
        }
      })();
    </script>
    
    <style>
      .skip-to-content {
        position: absolute;
        top: -40px;
        left: 0;
        background: #f20d0d;
        color: white;
        padding: 8px;
        z-index: 9999;
        text-decoration: none;
        font-weight: bold;
      }
      .skip-to-content:focus {
        top: 0;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
